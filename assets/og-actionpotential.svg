<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ActionPotential.AI open graph image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06090C"/>
      <stop offset="0.45" stop-color="#071016"/>
      <stop offset="1" stop-color="#06090C"/>
    </linearGradient>
    <radialGradient id="r1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 140) rotate(90) scale(420 520)">
      <stop stop-color="#2EA6D4" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2EA6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 190) rotate(90) scale(420 520)">
      <stop stop-color="#00A79D" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00A79D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 560) rotate(90) scale(360 520)">
      <stop stop-color="#FF4D8A" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FF4D8A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gradText" x1="360" y1="250" x2="960" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#79C5C7"/>
      <stop offset="0.38" stop-color="#2EA6D4"/>
      <stop offset="0.7" stop-color="#00A79D"/>
      <stop offset="1" stop-color="#FF4D8A"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#r1)"/>
  <rect width="1200" height="630" fill="url(#r2)"/>
  <rect width="1200" height="630" fill="url(#r3)"/>

  <!-- Neural-ish network -->
  <g opacity="0.55" stroke="rgba(255,255,255,0.14)" stroke-width="1">
    <path d="M160 420L310 330L450 390L600 300L760 350L920 270" />
    <path d="M220 250L360 300L520 230L680 290L840 220L1030 300" />
    <path d="M260 480L420 440L560 500L740 420L900 470" />
    <path d="M180 340L360 300L450 390" />
    <path d="M520 230L600 300L680 290" />
  </g>
  <g opacity="0.75">
    <circle cx="160" cy="420" r="6" fill="#79C5C7"/>
    <circle cx="310" cy="330" r="5" fill="#2EA6D4"/>
    <circle cx="450" cy="390" r="5" fill="#79C5C7"/>
    <circle cx="600" cy="300" r="6" fill="#2EA6D4"/>
    <circle cx="760" cy="350" r="5" fill="#00A79D"/>
    <circle cx="920" cy="270" r="6" fill="#1B75BB"/>

    <circle cx="220" cy="250" r="5" fill="#79C5C7"/>
    <circle cx="360" cy="300" r="6" fill="#2EA6D4"/>
    <circle cx="520" cy="230" r="6" fill="#00A79D"/>
    <circle cx="680" cy="290" r="5" fill="#2EA6D4"/>
    <circle cx="840" cy="220" r="5" fill="#1B75BB"/>
    <circle cx="1030" cy="300" r="6" fill="#79C5C7"/>
  </g>

  <!-- Action potential pulse streak -->
  <path
    d="M170 420C240 390 290 340 320 300C360 250 390 240 520 230C650 220 710 260 760 350C800 420 860 420 920 270"
    stroke="url(#gradText)"
    stroke-width="10"
    stroke-linecap="round"
    filter="url(#soft)"
    opacity="0.9"
  />

  <!-- Brand mark (simplified) -->
  <g transform="translate(92 84)">
    <rect x="0" y="0" width="128" height="128" rx="28" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)"/>
    <g transform="translate(10 10)">
      <svg width="108" height="108" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="dots2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(96 128) rotate(90) scale(96)">
            <stop stop-color="#79C5C7"/>
            <stop offset="0.55" stop-color="#2EA6D4"/>
            <stop offset="1" stop-color="#1B75BB"/>
          </radialGradient>
          <linearGradient id="axon2" x1="70" y1="70" x2="152" y2="176" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF7A59"/>
            <stop offset="0.55" stop-color="#FF4D8A"/>
            <stop offset="1" stop-color="#00A79D"/>
          </linearGradient>
        </defs>
        <g opacity="0.95" fill="url(#dots2)">
          <circle cx="128" cy="32" r="6"/>
          <circle cx="182" cy="50" r="5"/>
          <circle cx="224" cy="128" r="6"/>
          <circle cx="182" cy="206" r="5"/>
          <circle cx="128" cy="224" r="6"/>
          <circle cx="74" cy="206" r="5"/>
          <circle cx="32" cy="128" r="6"/>
          <circle cx="74" cy="50" r="5"/>
        </g>
        <path
          d="M78 174C98 160 110 143 116 124C122 105 122 87 130 72C138 57 156 49 176 56"
          stroke="url(#axon2)"
          stroke-width="10"
          stroke-linecap="round"
        />
        <circle cx="176" cy="56" r="6.2" fill="#FF4D8A"/>
      </svg>
    </g>
  </g>

  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <text x="260" y="160" fill="rgba(255,255,255,0.78)" font-size="20" font-weight="600" letter-spacing="-0.01em">
      Behavioral AI marketing &amp; automation
    </text>
    <text x="260" y="240" fill="white" font-size="64" font-weight="800" letter-spacing="-0.05em">
      ActionPotential<tspan fill="url(#gradText)">.AI</tspan>
    </text>
    <text x="260" y="300" fill="rgba(255,255,255,0.86)" font-size="32" font-weight="700" letter-spacing="-0.03em">
      From potential& to action.
    </text>
    <text x="260" y="350" fill="rgba(255,255,255,0.70)" font-size="22" font-weight="500" letter-spacing="-0.01em">
      Full-funnel Behavioral Engines that turn leads into customersautomatically.
    </text>
  </g>
</svg>
