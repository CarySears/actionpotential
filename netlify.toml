[build]
  publish = "."

[[redirects]]
  from = "/locations/nyc-ai-marketing-agency"
  to = "/locations/new-york-ai-marketing-agency.html"
  status = 301
  force = true

[[redirects]]
  from = "/locations/nyc-ai-marketing-agency.html"
  to = "/locations/new-york-ai-marketing-agency.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/seo-aeo"
  to = "/services/ai-search.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/seo-aeo.html"
  to = "/services/ai-search.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/ai-visibility"
  to = "/services/ai-search.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/ai-visibility.html"
  to = "/services/ai-search.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/ai-discoverability"
  to = "/services/ai-search.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/ai-discoverability.html"
  to = "/services/ai-search.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/behavioral-ai-marketing"
  to = "/services/behavioral-engine.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/behavioral-ai-marketing.html"
  to = "/services/behavioral-engine.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/conversational-marketing"
  to = "/services/behavioral-engine.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/conversational-marketing.html"
  to = "/services/behavioral-engine.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/marketing-automation"
  to = "/services/behavioral-engine.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/marketing-automation.html"
  to = "/services/behavioral-engine.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/paid-media-management"
  to = "/services/paid-media.html"
  status = 301
  force = true

[[redirects]]
  from = "/services/paid-media-management.html"
  to = "/services/paid-media.html"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"
